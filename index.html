<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0c0c10;
      --surface: #14141a;
      --surface2: #1c1c25;
      --border: #2a2a38;
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --accent3: #5cf0b8;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --success: #5cf0b8;
      --warning: #fcd45c;
      --danger: #fc5c7d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      padding: 0 24px 32px;
    }
    .logo span { color: var(--text); }
    .nav-section { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; padding: 0 24px 10px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 24px; cursor: pointer;
      font-size: 0.88rem; font-weight: 600;
      color: var(--muted); transition: all 0.18s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { color: var(--text); background: var(--surface2); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(124,92,252,0.08); }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    /* Main */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 32px 36px;
      min-height: 100vh;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px;
    }
    .page-title { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.03em; }
    .page-title span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .badge {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 16px; font-size: 0.8rem; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    /* Stat Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
      position: relative; overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-card::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: 0.12;
    }
    .stat-card:nth-child(1)::before { background: var(--accent); }
    .stat-card:nth-child(2)::before { background: var(--accent3); }
    .stat-card:nth-child(3)::before { background: var(--accent2); }
    .stat-card:nth-child(4)::before { background: var(--warning); }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
    .stat-value { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; }
    .stat-value.purple { color: var(--accent); }
    .stat-value.green  { color: var(--accent3); }
    .stat-value.pink   { color: var(--accent2); }
    .stat-value.yellow { color: var(--warning); }
    .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; font-family: 'DM Mono', monospace; }
    /* Grid Layout */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
    .card-action {
      font-size: 0.75rem; color: var(--accent); cursor: pointer;
      padding: 5px 12px; border: 1px solid rgba(124,92,252,0.3);
      border-radius: 6px; transition: all 0.15s;
    }
    .card-action:hover { background: rgba(124,92,252,0.12); }
    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    th { text-align: left; padding: 8px 12px; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); }
    td { padding: 12px 12px; border-bottom: 1px solid rgba(42,42,56,0.5); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    /* Status badge */
    .status {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.05em;
    }
    .status.Active,.status.Completed { background: rgba(92,240,184,0.12); color: var(--success); }
    .status.Inactive,.status.Cancelled { background: rgba(252,92,125,0.12); color: var(--danger); }
    .status.Pending { background: rgba(252,212,92,0.12); color: var(--warning); }
    .status.Processing { background: rgba(124,92,252,0.12); color: var(--accent); }
    /* Search/filter bar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .search-input {
      flex: 1; min-width: 200px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 8px 14px;
      font-family: 'DM Mono', monospace; font-size: 0.82rem; outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .select-filter {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 8px 12px;
      font-family: 'Syne', sans-serif; font-size: 0.82rem; cursor: pointer; outline: none;
    }
    .btn {
      padding: 8px 18px; border-radius: 8px; font-family: 'Syne', sans-serif;
      font-size: 0.82rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #6a49e8; }
    .btn-danger { background: rgba(252,92,125,0.12); color: var(--danger); border: 1px solid rgba(252,92,125,0.2); }
    .btn-danger:hover { background: rgba(252,92,125,0.22); }
    .btn-sm { padding: 5px 12px; font-size: 0.75rem; }
    /* Pagination */
    .pagination { display: flex; gap: 6px; justify-content: flex-end; margin-top: 16px; align-items: center; }
    .page-btn {
      min-width: 32px; height: 32px; border-radius: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; transition: all 0.15s;
    }
    .page-btn:hover, .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-info { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 999; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 460px; max-width: 96vw;
    }
    .modal-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }
    .form-input, .form-select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 9px 13px;
      font-family: 'Syne', sans-serif; font-size: 0.85rem; outline: none;
    }
    .form-input:focus, .form-select:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    /* Toast */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 13px 22px;
      border-radius: 10px; font-size: 0.85rem; font-weight: 600;
      z-index: 9999; transform: translateY(80px); opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    /* Page sections */
    .section { display: none; }
    .section.active { display: block; }
    /* Loading */
    .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 0.85rem; }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Donut legend */
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    /* Empty */
    .empty { padding: 40px; text-align: center; color: var(--muted); font-size: 0.85rem; }
    @media (max-width: 900px) {
      .sidebar { width: 60px; }
      .logo, .nav-section, .nav-text { display: none; }
      .main { margin-left: 60px; padding: 20px 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <div class="logo">dash<span>.</span></div>
  <div class="nav-section">Overview</div>
  <div class="nav-item active" onclick="showSection('overview')">
    <span class="nav-icon">📊</span><span class="nav-text">Overview</span>
  </div>
  <div class="nav-section" style="margin-top:18px">Manage</div>
  <div class="nav-item" onclick="showSection('orders')">
    <span class="nav-icon">📦</span><span class="nav-text">Orders</span>
  </div>
  <div class="nav-item" onclick="showSection('users')">
    <span class="nav-icon">👥</span><span class="nav-text">Users</span>
  </div>
</nav>

<!-- Main Content -->
<div class="main">
  <div class="topbar">
    <div class="page-title" id="pageTitle">Overview <span>Dashboard</span></div>
    <div class="topbar-right">
      <span class="badge"><span class="dot"></span>MongoDB Live</span>
      <span class="badge" id="clockBadge" style="font-family:'DM Mono',monospace"></span>
    </div>
  </div>

  <!-- OVERVIEW SECTION -->
  <div class="section active" id="section-overview">
    <div class="stats-grid" id="statsGrid">
      <div class="loader"><span class="spinner"></span>Loading stats...</div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Revenue (Last 6 Months)</div>
        </div>
        <canvas id="revenueChart" height="180"></canvas>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title">Orders by Status</div>
        </div>
        <canvas id="statusChart" height="160"></canvas>
        <div class="legend" id="statusLegend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Recent Orders</div>
        <span class="card-action" onclick="showSection('orders')">View All →</span>
      </div>
      <div class="table-wrap" id="recentOrdersTable"><div class="loader"><span class="spinner"></span>Loading...</div></div>
    </div>
  </div>

  <!-- ORDERS SECTION -->
  <div class="section" id="section-orders">
    <div class="toolbar">
      <input class="search-input" type="text" id="orderSearch" placeholder="Search orders..." oninput="debounce(loadOrders, 400)()">
      <select class="select-filter" id="orderStatusFilter" onchange="loadOrders()">
        <option value="">All Status</option>
        <option>Pending</option><option>Processing</option><option>Completed</option><option>Cancelled</option>
      </select>
      <select class="select-filter" id="orderCatFilter" onchange="loadOrders()">
        <option value="">All Categories</option>
        <option>Electronics</option><option>Clothing</option><option>Food</option><option>Books</option><option>Other</option>
      </select>
      <button class="btn btn-primary" onclick="openOrderModal()">+ Add Order</button>
    </div>
    <div class="card">
      <div class="table-wrap" id="ordersTable"><div class="loader"><span class="spinner"></span>Loading...</div></div>
      <div class="pagination" id="ordersPagination"></div>
    </div>
  </div>

  <!-- USERS SECTION -->
  <div class="section" id="section-users">
    <div class="toolbar">
      <input class="search-input" type="text" id="userSearch" placeholder="Search users..." oninput="debounce(loadUsers, 400)()">
      <select class="select-filter" id="userStatusFilter" onchange="loadUsers()">
        <option value="">All Status</option>
        <option>Active</option><option>Inactive</option>
      </select>
      <select class="select-filter" id="userRoleFilter" onchange="loadUsers()">
        <option value="">All Roles</option>
        <option>Admin</option><option>Editor</option><option>Viewer</option>
      </select>
      <button class="btn btn-primary" onclick="openUserModal()">+ Add User</button>
    </div>
    <div class="card">
      <div class="table-wrap" id="usersTable"><div class="loader"><span class="spinner"></span>Loading...</div></div>
      <div class="pagination" id="usersPagination"></div>
    </div>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div class="modal-title" id="orderModalTitle">Add Order</div>
    <input type="hidden" id="orderEditId">
    <div class="form-group"><label class="form-label">Order ID</label><input class="form-input" id="f_orderId" placeholder="ORD-0001"></div>
    <div class="form-group"><label class="form-label">Customer</label><input class="form-input" id="f_customer" placeholder="Customer Name"></div>
    <div class="form-group"><label class="form-label">Product</label><input class="form-input" id="f_product" placeholder="Product Name"></div>
    <div class="form-group"><label class="form-label">Amount ($)</label><input class="form-input" type="number" id="f_amount" placeholder="99.99"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="f_status"><option>Pending</option><option>Processing</option><option>Completed</option><option>Cancelled</option></select>
      </div>
      <div class="form-group"><label class="form-label">Category</label>
        <select class="form-select" id="f_category"><option>Electronics</option><option>Clothing</option><option>Food</option><option>Books</option><option>Other</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()" style="background:var(--surface2);color:var(--muted)">Cancel</button>
      <button class="btn btn-primary" onclick="saveOrder()">Save Order</button>
    </div>
  </div>
</div>

<!-- USER MODAL -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-title" id="userModalTitle">Add User</div>
    <input type="hidden" id="userEditId">
    <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="u_name" placeholder="John Doe"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="u_email" placeholder="john@example.com"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-select" id="u_role"><option>Admin</option><option>Editor</option><option>Viewer</option></select>
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="u_status"><option>Active</option><option>Inactive</option></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModals()" style="background:var(--surface2);color:var(--muted)">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = '/api';
  let revenueChart, statusChart;
  let orderPage = 1, userPage = 1;

  // ─── Clock ────────────────────────────────────────────
  function updateClock() {
    document.getElementById('clockBadge').textContent = new Date().toLocaleTimeString();
  }
  setInterval(updateClock, 1000); updateClock();

  // ─── Nav ──────────────────────────────────────────────
  function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    event?.currentTarget?.classList.add('active');
    const titles = { overview:'Overview <span>Dashboard</span>', orders:'Orders <span>Management</span>', users:'Users <span>Management</span>' };
    document.getElementById('pageTitle').innerHTML = titles[name];
    if (name === 'overview') loadOverview();
    if (name === 'orders') { orderPage=1; loadOrders(); }
    if (name === 'users') { userPage=1; loadUsers(); }
  }

  // ─── Toast ────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── Debounce ─────────────────────────────────────────
  function debounce(fn, delay) {
    let timer;
    return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
  }

  // ─── Overview ─────────────────────────────────────────
  async function loadOverview() {
    try {
      const res = await fetch(`${API}/orders/stats/summary`);
      const { data } = await res.json();

      // Stats cards
      const totalUsers = await fetch(`${API}/users?limit=1`).then(r=>r.json()).then(d=>d.pagination?.total||0);
      const pending = data.statusBreakdown.find(s=>s._id==='Pending')?.count||0;
      const completed = data.statusBreakdown.find(s=>s._id==='Completed')?.count||0;

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value purple">$${data.totalRevenue.toLocaleString('en',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
          <div class="stat-sub">from completed orders</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Orders</div>
          <div class="stat-value green">${data.totalOrders}</div>
          <div class="stat-sub">${pending} pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div class="stat-value pink">${completed}</div>
          <div class="stat-sub">${data.totalOrders ? Math.round(completed/data.totalOrders*100) : 0}% success rate</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Users</div>
          <div class="stat-value yellow">${totalUsers}</div>
          <div class="stat-sub">registered accounts</div>
        </div>`;

      // Revenue chart
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const labels = data.monthlyRevenue.map(m => months[m._id.month-1]+' '+m._id.year);
      const values = data.monthlyRevenue.map(m => m.revenue);
      if (revenueChart) revenueChart.destroy();
      revenueChart = new Chart(document.getElementById('revenueChart'), {
        type: 'bar',
        data: {
          labels, datasets: [{
            label: 'Revenue',
            data: values,
            backgroundColor: 'rgba(124,92,252,0.5)',
            borderColor: '#7c5cfc',
            borderWidth: 2,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#6b6b85', font:{family:'DM Mono'} }, grid: { color: '#2a2a38' } },
            y: { ticks: { color: '#6b6b85', font:{family:'DM Mono'}, callback: v=>'$'+v }, grid: { color: '#2a2a38' } }
          }
        }
      });

      // Donut chart
      const statusColors = { Completed:'#5cf0b8', Pending:'#fcd45c', Processing:'#7c5cfc', Cancelled:'#fc5c7d' };
      const sLabels = data.statusBreakdown.map(s=>s._id);
      const sValues = data.statusBreakdown.map(s=>s.count);
      const sColors = sLabels.map(l=>statusColors[l]||'#6b6b85');
      if (statusChart) statusChart.destroy();
      statusChart = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: { labels: sLabels, datasets: [{ data: sValues, backgroundColor: sColors.map(c=>c+'33'), borderColor: sColors, borderWidth: 2 }] },
        options: {
          cutout: '68%', responsive: true,
          plugins: { legend: { display: false } }
        }
      });
      document.getElementById('statusLegend').innerHTML = sLabels.map((l,i)=>`
        <div class="legend-item"><div class="legend-dot" style="background:${sColors[i]}"></div>${l}: ${sValues[i]}</div>`).join('');

      // Recent orders
      const ro = await fetch(`${API}/orders?limit=5`).then(r=>r.json());
      renderOrdersTable('recentOrdersTable', ro.data, false);
    } catch(e) {
      document.getElementById('statsGrid').innerHTML = `<div class="loader" style="grid-column:1/-1">⚠️ Failed to connect to API. Is the server running?</div>`;
    }
  }

  // ─── Orders ───────────────────────────────────────────
  async function loadOrders() {
    document.getElementById('ordersTable').innerHTML = '<div class="loader"><span class="spinner"></span>Loading...</div>';
    const search = document.getElementById('orderSearch').value;
    const status = document.getElementById('orderStatusFilter').value;
    const category = document.getElementById('orderCatFilter').value;
    const params = new URLSearchParams({ page: orderPage, limit: 10, search, status, category });
    const { data, pagination } = await fetch(`${API}/orders?${params}`).then(r=>r.json());
    renderOrdersTable('ordersTable', data, true);
    renderPagination('ordersPagination', pagination, p => { orderPage=p; loadOrders(); });
  }

  function renderOrdersTable(containerId, orders, actions) {
    if (!orders?.length) { document.getElementById(containerId).innerHTML = '<div class="empty">No orders found.</div>'; return; }
    document.getElementById(containerId).innerHTML = `
      <table>
        <thead><tr>
          <th>Order ID</th><th>Customer</th><th>Product</th><th>Amount</th>
          <th>Category</th><th>Status</th><th>Date</th>${actions?'<th>Actions</th>':''}
        </tr></thead>
        <tbody>
          ${orders.map(o=>`<tr>
            <td style="font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--accent)">${o.orderId}</td>
            <td>${o.customer}</td>
            <td>${o.product}</td>
            <td style="font-family:'DM Mono',monospace">$${o.amount.toFixed(2)}</td>
            <td><span style="color:var(--muted);font-size:0.78rem">${o.category}</span></td>
            <td><span class="status ${o.status}">${o.status}</span></td>
            <td style="color:var(--muted);font-size:0.78rem">${new Date(o.createdAt).toLocaleDateString()}</td>
            ${actions?`<td>
              <button class="btn btn-sm btn-primary" onclick="editOrder('${o._id}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteOrder('${o._id}')">Del</button>
            </td>`:''}
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  async function deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    const res = await fetch(`${API}/orders/${id}`, { method:'DELETE' });
    const d = await res.json();
    d.success ? showToast('Order deleted') : showToast(d.message, 'error');
    loadOrders();
  }

  async function editOrder(id) {
    const { data } = await fetch(`${API}/orders/${id}`).then(r=>r.json());
    document.getElementById('orderEditId').value = id;
    document.getElementById('f_orderId').value = data.orderId;
    document.getElementById('f_customer').value = data.customer;
    document.getElementById('f_product').value = data.product;
    document.getElementById('f_amount').value = data.amount;
    document.getElementById('f_status').value = data.status;
    document.getElementById('f_category').value = data.category;
    document.getElementById('orderModalTitle').textContent = 'Edit Order';
    document.getElementById('orderModal').classList.add('open');
  }

  function openOrderModal() {
    document.getElementById('orderEditId').value = '';
    document.getElementById('orderModalTitle').textContent = 'Add Order';
    ['f_orderId','f_customer','f_product','f_amount'].forEach(id => document.getElementById(id).value='');
    document.getElementById('orderModal').classList.add('open');
  }

  async function saveOrder() {
    const id = document.getElementById('orderEditId').value;
    const body = {
      orderId: document.getElementById('f_orderId').value,
      customer: document.getElementById('f_customer').value,
      product: document.getElementById('f_product').value,
      amount: parseFloat(document.getElementById('f_amount').value),
      status: document.getElementById('f_status').value,
      category: document.getElementById('f_category').value,
    };
    const url = id ? `${API}/orders/${id}` : `${API}/orders`;
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await res.json();
    if (d.success) { showToast(id?'Order updated':'Order created'); closeModals(); loadOrders(); }
    else showToast(d.message, 'error');
  }

  // ─── Users ────────────────────────────────────────────
  async function loadUsers() {
    document.getElementById('usersTable').innerHTML = '<div class="loader"><span class="spinner"></span>Loading...</div>';
    const search = document.getElementById('userSearch').value;
    const status = document.getElementById('userStatusFilter').value;
    const role = document.getElementById('userRoleFilter').value;
    const params = new URLSearchParams({ page: userPage, limit: 10, search, status, role });
    const { data, pagination } = await fetch(`${API}/users?${params}`).then(r=>r.json());
    document.getElementById('usersTable').innerHTML = data?.length ? `
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>
          ${data.map(u=>`<tr>
            <td><strong>${u.name}</strong></td>
            <td style="font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted)">${u.email}</td>
            <td><span style="color:var(--accent);font-size:0.78rem;font-weight:700">${u.role}</span></td>
            <td><span class="status ${u.status}">${u.status}</span></td>
            <td style="color:var(--muted);font-size:0.78rem">${new Date(u.createdAt).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-sm btn-primary" onclick="editUser('${u._id}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteUser('${u._id}')">Del</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<div class="empty">No users found.</div>';
    renderPagination('usersPagination', pagination, p => { userPage=p; loadUsers(); });
  }

  async function editUser(id) {
    const { data } = await fetch(`${API}/users/${id}`).then(r=>r.json());
    document.getElementById('userEditId').value = id;
    document.getElementById('u_name').value = data.name;
    document.getElementById('u_email').value = data.email;
    document.getElementById('u_role').value = data.role;
    document.getElementById('u_status').value = data.status;
    document.getElementById('userModalTitle').textContent = 'Edit User';
    document.getElementById('userModal').classList.add('open');
  }

  function openUserModal() {
    document.getElementById('userEditId').value = '';
    document.getElementById('userModalTitle').textContent = 'Add User';
    ['u_name','u_email'].forEach(id => document.getElementById(id).value='');
    document.getElementById('userModal').classList.add('open');
  }

  async function saveUser() {
    const id = document.getElementById('userEditId').value;
    const body = { name:document.getElementById('u_name').value, email:document.getElementById('u_email').value, role:document.getElementById('u_role').value, status:document.getElementById('u_status').value };
    const url = id ? `${API}/users/${id}` : `${API}/users`;
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const d = await res.json();
    if (d.success) { showToast(id?'User updated':'User created'); closeModals(); loadUsers(); }
    else showToast(d.message, 'error');
  }

  async function deleteUser(id) {
    if (!confirm('Delete this user?')) return;
    const res = await fetch(`${API}/users/${id}`, {method:'DELETE'});
    const d = await res.json();
    d.success ? showToast('User deleted') : showToast(d.message, 'error');
    loadUsers();
  }

  // ─── Pagination ───────────────────────────────────────
  function renderPagination(containerId, pagination, onPage) {
    if (!pagination || pagination.pages <= 1) { document.getElementById(containerId).innerHTML = ''; return; }
    const { page, pages, total } = pagination;
    let html = `<span class="page-info">${total} total &nbsp;</span>`;
    if (page > 1) html += `<button class="page-btn" onclick="(${onPage.toString()})(${page-1})">‹</button>`;
    for (let i = Math.max(1, page-1); i <= Math.min(pages, page+1); i++) {
      html += `<button class="page-btn ${i===page?'active':''}" onclick="(${onPage.toString()})(${i})">${i}</button>`;
    }
    if (page < pages) html += `<button class="page-btn" onclick="(${onPage.toString()})(${page+1})">›</button>`;
    document.getElementById(containerId).innerHTML = html;
  }

  // ─── Modal ────────────────────────────────────────────
  function closeModals() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open'));
  }
  document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) closeModals(); }));

  // ─── Init ─────────────────────────────────────────────
  loadOverview();
</script>
</body>
</html>
